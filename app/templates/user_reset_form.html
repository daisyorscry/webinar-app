{% extends 'base.html' %}
{% block content %}
  <div class="bg-white border border-slate-200 rounded-2xl p-6 max-w-md">
    <h2 class="text-2xl font-semibold mb-4">Buat Password Baru</h2>
    <form method="post" class="space-y-4">
      <div>
        <label class="text-xs text-slate-600">Password Baru</label>
        <input class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2" type="password" name="password" required />
      </div>
      <div>
        <label class="text-xs text-slate-600">Konfirmasi Password</label>
        <input class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2" type="password" name="confirm" required />
      </div>
      <button class="w-full bg-teal-500 hover:bg-teal-400 text-slate-900 font-semibold rounded-lg py-2" type="submit">Reset Password</button>
    </form>
  </div>
{% endblock %}
