{% extends 'base.html' %}
{% block content %}
  <div class="bg-white border border-slate-200 rounded-2xl p-6 max-w-xl space-y-4">
    <h2 class="text-2xl font-semibold">Token Reset Dibuat</h2>
    <p class="text-sm text-slate-600">Ini simulasi. Di production token dikirim via email.</p>
    <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm text-teal-300 break-all">{{ token }}</div>
    <a class="text-sm text-teal-300" href="{{ url_for('main.user_reset_form', token=token) }}">Lanjut reset password</a>
  </div>
{% endblock %}
