{% extends 'base.html' %}
{% block content %}
  <div class="max-w-6xl mx-auto space-y-6">
    <section class="flex flex-col gap-4 border-b border-slate-200 pb-5 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="text-xs uppercase tracking-[0.3em] text-teal-600">Certificate</p>
        <h2 class="mt-1 text-3xl font-semibold tracking-tight text-slate-900">Sertifikat Digital</h2>
        <p class="mt-2 text-sm text-slate-600">{{ certificate.registration.event.title }}</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <a class="inline-flex items-center gap-2 rounded-2xl border border-slate-300 px-4 py-2.5 text-sm font-semibold text-slate-700 hover:border-slate-400 hover:text-slate-900" href="{{ url_for('main.registration_success', registration_id=certificate.registration_id) }}">
          Kembali
        </a>
        <a class="inline-flex items-center gap-2 rounded-2xl bg-teal-700 px-4 py-2.5 text-sm font-semibold text-white hover:bg-teal-600" href="{{ url_for('main.certificate_download', certificate_number=certificate.certificate_number) }}">
          <i class="fa-solid fa-download"></i>
          Download SVG
        </a>
      </div>
    </section>

    <section class="rounded-2xl border border-slate-200 bg-white p-4 overflow-x-auto">
      <div class="min-w-[900px]">
        {{ svg_markup|safe }}
      </div>
    </section>
  </div>
{% endblock %}
